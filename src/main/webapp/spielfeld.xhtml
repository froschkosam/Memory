<ui:composition
        xmlns:p="http://primefaces.org/ui"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns="http://www.w3.org/1999/xhtml"
>



    <div id="feld">

        <p>
            <p:outputLabel style="margin-down: 1em;  margin-right: 5em; margin-left: 5em; color: white;
                            font-size:25px; text-align: center" value="Spieler 1: #{kartenController.getPunkte1()}"/>

            <p:outputLabel style="margin-down: 1em; margin-right: 5em; margin-left: 5em; color: white;
                           font-size:25px; text-align: center" value="Spieler 2: #{kartenController.getPunkte2()}"/>
        </p>

        <ui:repeat value="#{kartenController.getZeile()}" var="zeile">
            <p>
                <ui:repeat value="#{kartenController.getReihe()}" var="reihe">
                    <p:commandLink action="#{kartenController.umdrehen(zeile, reihe)}" update="@form">
                        <p:graphicImage name="#{kartenController.kartenInhalt(zeile, reihe)}"
                                        style="margin-right: 0.5em; margin-left: 0.5em;" width="100"
                                        height="100"/>
                    </p:commandLink>
                </ui:repeat>
            </p>
        </ui:repeat>

    </div>
</ui:composition>
